<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Body Type Quiz - Fashionify</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      padding: 2rem;
      background-color: #f9f9f9;
      color: #333;
    }

    .quiz-container {
      margin-top: 2rem;
    }

    .quiz-question {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    .quiz-answer {
      margin: 1rem 0;
      font-size: 1.2rem;
    }

    .submit-btn {
      font-size: 1.2rem;
      color: white;
      background-color: #FF007A;
      padding: 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .submit-btn:hover {
      background-color: #ff3399;
    }

    footer {
      background-color: #444;
      color: white;
      padding: 1rem;
      text-align: center;
    }

    footer a {
      color: white;
      text-decoration: none;
      padding: 0.5rem 1rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Fashionify</div>
    <div class="header-icons">
      <a href="favorites.html"><i class="fa fa-heart"></i></a>
      <a href="home.html"><i class="fa fa-home"></i></a>
    </div>
  </header>

  <section class="quiz-container">
    <h2>Body Type Quiz</h2>
    <form>
      <div class="quiz-question">
        <p>What is your body shape?</p>
        <div class="quiz-answer">
          <input type="radio" id="hourglass" name="bodyShape" value="Hourglass">
          <label for="hourglass">Hourglass</label>
        </div>
        <div class="quiz-answer">
          <input type="radio" id="pear" name="bodyShape" value="Pear">
          <label for="pear">Pear</label>
        </div>
        <div class="quiz-answer">
          <input type="radio" id="apple" name="bodyShape" value="Apple">
          <label for="apple">Apple</label>
        </div>
      </div>

      <div class="quiz-question">
        <p>What is your waist size?</p>
        <div class="quiz-answer">
          <input type="radio" id="small" name="waistSize" value="Small">
          <label for="small">Small</label>
        </div>
        <div class="quiz-answer">
          <input type="radio" id="medium" name="waistSize" value="Medium">
          <label for="medium">Medium</label>
        </div>
        <div class="quiz-answer">
          <input type="radio" id="large" name="waistSize" value="Large">
          <label for="large">Large</label>
        </div>
      </div>

      <button type="submit" class="submit-btn">Submit</button>
    </form>
  </section>

  <footer>
    <a href="profile.html"><i class="fa fa-user"></i><span>Profile</span></a>
    <a href="home.html"><i class="fa fa-home"></i><span>Home</span></a>
    <a href="ootd.html"><i class="fa fa-camera"></i><span>OOTD</span></a>
  </footer>

</body>
</html>
