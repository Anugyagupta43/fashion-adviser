<!DOCTYPE html>

   <link href="https://fonts.googleapis.com/css2?family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">


  <style>
    :root {
      --primary-dark:#FF007A;
     --bg-dark: #1C1C24;
      --text-dark: #fff;
      --accent: #C8A2C8;
      --bg-light: #fff;
      --text-light: #C8A2C8;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      transition: background 0.3s, color 0.3s;
      background-color: var(--bg-dark);
      color: var(--text-dark);
      padding-bottom: 80px;
    }

    body.light {
       background: linear-gradient(to left, #ffffff,#fdf6ff);
      color: var(--primary-light);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background-color:  #FF007A;
      color:#fff;
    }

    body.light header {
      background-color:  #C8A2C8 ;
      color:var(--bg-light);
    }

    .logo {
      font-weight: bold;
      font-size: 1.5rem;
    }

    .header-icons {
      display: flex;
      align-items: center;
    }

    .header-icons a {
      color: white;
      text-decoration: none;
      margin-right: 40px;
      font-size: 1.4rem;
    }

    .theme-toggle {
    position: absolute;
    top: 48px;
    right: 60px;
  }

  /* Cute Toggle Switch */
  .switch {
    position: relative;
    display: inline-block;
    width: 60px;
    height: 32px;
  }

  .switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0;
    right: 0; bottom: 0;
     background-color: #1C1C24;
    transition: .4s;
    border-radius: 34px;
  }

  .slider:before {
    position: absolute;
    content: "🌙";
    height: 24px;
    width: 24px;
    left: 4px;
    bottom: 4px;
    background-color: white;
    border-radius: 50%;
    transition: .4s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  input:checked + .slider {
    background-color: white;
  }

  input:checked + .slider:before {
    transform: translateX(26px);
    content: "☀️";
  }

    .section {
      padding: 2rem;
    }

    .section-title {
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }



.fancy-text {
  font-family: 'Monsieur La Doulaise', cursive;
  font-size: 3rem; /* Adjust the size as needed */
}



    .carousel {
      display: flex;
      gap: 1rem;
      scroll-snap-type: x mandatory;
    }

    .carousel-item {
      flex: 0 0 auto;
      width: 280px;
      height: 250px;
      border-radius: 15px;
      overflow: hidden;
      scroll-snap-align: start;
      position: relative;
      transition: transform 0.3s;
    }

    .carousel-item:hover {
      transform: scale(1.1);
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
.overlay-text {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  padding: 0.5rem;
  background: rgba(0, 0, 0, 0.4); /* alpha channel */
  color: white;
  text-align: center;
  font-weight: 600;
}
    footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background-color: #FF007A;;
      color:var(--bg-dark);

      justify-content: space-around;
      align-items: center;
      padding: 1rem;
    }

    body.light footer {

      color: var(--bg-light);
    }

    footer a {
      text-decoration: none;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 0.9rem;
    }
  </style>
</head>
